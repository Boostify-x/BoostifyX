<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoostifyX | Support Tickets</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="dashboard-mode">

    <div id="dashboard-wrapper">
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <div class="sidebar" id="sidebarMenu">
            <div class="sidebar-header">
                <a href="../index.html" class="logo">BoostifyX</a>
                <i class="fas fa-times close-btn" id="closeMenuBtn"></i>
            </div>
            <div class="sidebar-balance">
                <span class="user-balance">₹0.00</span>
                <i class="fas fa-wallet" style="color: var(--dash-primary-purple);"></i>
            </div>
            
            <ul class="sidebar-menu">
                <li><a href="../dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="new-order.html"><i class="fas fa-shopping-cart"></i> New Order</a></li>
                <li><a href="new-order.html#massorder"><i class="fas fa-layer-group"></i> Mass Order</a></li>
                <li><a href="orders.html"><i class="fas fa-list-alt"></i> Orders</a></li>
                <li><a href="add-funds.html"><i class="fas fa-rupee-sign"></i> Add Funds</a></li>
                <li><a href="transactions.html"><i class="fas fa-exchange-alt"></i> Transactions</a></li>
                <li><a href="../dashboard.html#affiliates"><i class="fas fa-users"></i> Affiliates</a></li>
                <li><a href="support.html" class="active"><i class="fas fa-headset"></i> Support Tickets</a></li>
                <li><a href="../dashboard.html#announcements"><i class="fas fa-bullhorn"></i> Announcements</a></li>
                <li><a href="../dashboard.html#blog"><i class="fas fa-blog"></i> Blog</a></li>
                <li><a href="../dashboard.html#profile"><i class="fas fa-user-circle"></i> Profile</a></li>
                <li><a href="#" onclick="logoutUser(event)"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </div>

        <header class="header">
            <a href="../index.html" class="logo">BoostifyX</a>
            <i class="fas fa-bars menu-icon" id="openMenuBtn"></i>
        </header>

        <div id="view-tickets" class="container">
            <div class="card">
                <form id="ticketForm">
                    <div class="form-group"><label>Order ID</label><input type="text" id="ticketID" class="form-control"></div>
                    <div class="form-group"><label>Message</label><textarea id="ticketMsg" class="form-control" style="min-height: 100px;"></textarea></div>
                    <button type="submit" class="btn-red full">Submit ticket</button>
                </form>
            </div>
            <div class="card">
                <div class="table-responsive">
                    <table class="custom-table" id="ticketTable">
                        <thead><tr><th>ID</th><th>Subject</th><th>Status</th><th>Date</th></tr></thead>
                        <tbody><tr id="noTicketMsg"><td colspan="4" style="text-align:center;">No tickets found</td></tr></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Chatbot Snippet -->
    <div class="ai-chat-btn" id="globalChatBtn" onclick="openChatbotPage()"><img src="https://i.ibb.co/3yjMhhcd/file-00000000408c71faa06b9ed512ae0c3a.png" alt="AI Chatbot"></div>
    <div id="chatbot-page">
        <div class="chat-header-bar"><i class="fas fa-arrow-left chat-back-btn" onclick="closeChatbotPage()"></i><div class="chat-bot-profile"><img src="https://i.ibb.co/3yjMhhcd/file-00000000408c71faa06b9ed512ae0c3a.png"></div><div class="chat-info"><h3>Boostify<span class="x-accent">X</span> AI</h3><p>Active Now</p></div></div>
        <div class="chat-container" id="chatBox"></div>
        <div class="chat-footer"><div style="cursor:pointer; color:#636e72; font-size: 20px; padding: 5px;" onclick="document.getElementById('fileInp').click()"><i class="fas fa-paperclip"></i></div><input type="file" id="fileInp" hidden onchange="handleFile(this)"><input type="text" id="msgInp" class="chat-input-box locked" placeholder="Select an option above..." disabled oninput="checkInput()"><button class="chat-btn-send" id="sendBtn" onclick="onSend()"><i class="fas fa-paper-plane"></i></button></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="../js/firebase.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/dashboard.js"></script>
</body>
</html>
