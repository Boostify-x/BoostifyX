<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Sign Up | BoostifyX</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div style="width: 100%; max-width: 400px;">
            <a href="index.html" class="auth-logo">BoostifyX</a>

            <!-- LOGIN CARD -->
            <div class="login-card" id="login-card-container">
                <h3>Sign In</h3>
                <div class="form-group"><label>Username or Email</label><input type="text" id="login-email" required></div>
                <div class="form-group"><label>Password</label><input type="password" id="login-password" required></div>
                <a href="javascript:void(0);" onclick="handleForgotPassword()" class="forgot-pass">Forgot password?</a>
                <button type="button" class="btn btn-signin" onclick="handleLogin(event)">Sign In</button>
                <button type="button" class="google-login" onclick="signInWithGoogle(event)">Sign in with Google</button>
                <p class="signup-text">Don't have an account? <a href="javascript:void(0);" onclick="toggleAuth('signup')">Sign up</a></p>
            </div>

            <!-- SIGNUP CARD -->
            <div class="login-card" id="signup-card-container" style="display: none;">
                <h3>Create Account</h3>
                <button type="button" class="google-login" style="margin-bottom: 15px;" onclick="signInWithGoogle(event)">Sign up with Google</button>
                <div class="form-group"><label>Username</label><input type="text" id="signup-username" required></div>
                <div class="form-group"><label>Email</label><input type="email" id="signup-email" required></div>
                <div class="form-group"><label>Password</label><input type="password" id="signup-password" required></div>
                <button type="button" class="btn btn-signin" onclick="handleSignup(event)">Sign Up</button>
                <p class="signup-text">Already have an account? <a href="javascript:void(0);" onclick="toggleAuth('login')">Sign in</a></p>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/firebase.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
