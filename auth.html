<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoostifyX | Authentication</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="landing-mode">

    <div id="landing-wrapper">
        <div class="hero-wrapper" style="min-height: 100vh; display:flex; flex-direction: column;">
            <header id="header">
                <div class="container">
                    <nav>
                        <a href="index.html" class="logo">BoostifyX</a>
                        <div class="nav-right">
                            <a href="index.html" class="btn btn-outline" style="padding: 8px 16px; font-size: 12px;"><i class="fas fa-home"></i> Home</a>
                        </div>
                    </nav>
                </div>
            </header>

            <section class="hero" style="flex: 1; display: flex; align-items: center; justify-content: center; padding-top: 20px;">
                <div class="container" style="width: 100%;">
                    
                    <div class="login-card fade-in" id="login-card-container">
                        <h3>Sign In to Dashboard</h3>
                        <div class="form-group">
                            <label>Username or Email</label>
                            <input type="text" id="login-email" placeholder="Enter username or email" required>
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="login-password" placeholder="••••••••" required>
                        </div>
                        <a href="javascript:void(0);" onclick="handleForgotPassword()" class="forgot-pass">Forgot password?</a>
                        
                        <button type="button" class="btn btn-signin" onclick="handleLogin(event)">Sign In</button>
                        
                        <button type="button" class="google-login" onclick="signInWithGoogle(event)">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="18" alt="G">
                            Sign in with Google
                        </button>

                        <p class="signup-text">Don't have an account? <a href="javascript:void(0);" onclick="showSignupCard()">Sign up Now</a></p>
                    </div>

                    <div class="login-card fade-in" id="signup-card-container" style="display: none;">
                        <h3>Create an Account</h3>
                        
                        <button type="button" class="google-login" style="margin-bottom: 20px;" onclick="signInWithGoogle(event)">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="18" alt="G">
                            Sign up with Google
                        </button>

                        <div class="form-group">
                            <label>Username</label>
                            <input type="text" id="signup-username" placeholder="Choose a username" required>
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="signup-email" placeholder="Enter your email" required>
                        </div>
                        <div class="form-group">
                            <label>WhatsApp</label>
                            <input type="tel" id="signup-whatsapp" placeholder="Your WhatsApp number" required>
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="signup-password" placeholder="Create a password" required>
                        </div>
                        <div class="form-group">
                            <label>Confirm Password</label>
                            <input type="password" id="signup-confirm-password" placeholder="Repeat password" required>
                        </div>
                        
                        <button type="button" class="btn btn-signin" style="margin-top: 5px;" onclick="handleSignup(event)">Sign Up</button>

                        <p class="signup-text">Already have an account? <a href="javascript:void(0);" onclick="showLoginCard()">Sign in</a></p>
                    </div>

                </div>
            </section>
        </div> 
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script src="js/firebase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if(window.location.hash === '#signup') showSignupCard();
        });
    </script>
</body>
</html>
